<!DOCTYPE html>
<html>
<head>
    <title>Frost Fleet Live Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; color: #333; }
        #map { height: 100vh; width: 100%; }
        
        .overlay { 
            position: absolute; top: 10px; right: 10px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 240px;
        }

        h2 { margin: 0 0 5px 0; font-size: 18px; color: #E62411; border-bottom: 2px solid #E62411; padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        .status { font-size: 12px; color: #555; margin-bottom: 15px; }
        
        .driver-list-header { font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #333; }
        #activeDriversList { list-style: none; padding: 0; margin: 0; font-size: 13px; }
        
        /* Updated CSS for the List Items to support the drop-down details */
        #activeDriversList li { 
            padding: 8px 0; 
            border-bottom: 1px solid #eee;
            display: block; 
        }
        #activeDriversList li:last-child { border-bottom: none; }
        
        .driver-row { display: flex; justify-content: space-between; align-items: center; }
        .driver-name { color: #E62411; font-weight: bold; cursor: pointer; transition: all 0.2s ease; }
        .driver-name:hover { color: #b31c0d; text-decoration: underline; }
        
        /* Light Theme Popup Customization */
        .popup-title { color: #E62411; font-size: 15px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase;}
        .popup-row { display: flex; justify-content: space-between; margin-bottom: 3px; font-size: 13px; }
        .popup-label { color: #666; }
        .popup-val { font-weight: bold; color: #222;}
        hr { border: 0; border-top: 1px solid #ddd; margin: 8px 0; }
    </style>
</head>
<body>

    <div class="overlay">
        <h2>Frost Fleet Live</h2>
        <div id="lastUpdate" class="status">Connecting...</div>
        
        <div class="driver-list-header">Active Shift Drivers</div>
        <ul id="activeDriversList">
            <li>Loading...</li>
        </ul>
    </div>
    
    <div id="map"></div>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- INITIALIZE MAP ---
        const map = L.map('map').setView([53.21, -1.11], 10); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};
        
        // --- GLOBAL STATE ---
        // Remembers which driver is clicked so details stay open during 30s auto-refresh
        let selectedDriver = null; 

        // --- FUNCTIONS ---
        async function updateLiveLocations() {
            try {
                // Set a rolling "Shift Window" (18 hours)
                const shiftWindowHours = 18; 
                const shiftCutoff = new Date(Date.now() - shiftWindowHours * 60 * 60 * 1000).toISOString();

                // Fetch tracking, vehicle checks, and trailer checks using the unified shift cutoff
                const [trackingRes, vehicleRes, trailerRes] = await Promise.all([
                    _supabase.from('vehicle_tracking').select('*').gte('created_at', shiftCutoff).order('created_at', { ascending: false }),
                    _supabase.from('daily_vehicle_checks').select('driver_name, registration').gte('created_at', shiftCutoff).order('created_at', { ascending: false }),
                    _supabase.from('daily_trailer_checks').select('driver_name, trailer_number').gte('created_at', shiftCutoff).order('created_at', { ascending: false })
                ]);

                if (trackingRes.error) throw trackingRes.error;

                const latestVehicles = {};
                vehicleRes.data?.forEach(row => {
                    const name = row.driver_name.toUpperCase();
                    if (!latestVehicles[name]) latestVehicles[name] = row.registration;
                });

                const latestTrailers = {};
                trailerRes.data?.forEach(row => {
                    const name = row.driver_name.toUpperCase();
                    if (!latestTrailers[name]) latestTrailers[name] = row.trailer_number;
                });

                const latestPositions = {};
                const activeNames = new Set();

                trackingRes.data.forEach(row => {
                    const nameKey = row.driver_name.toUpperCase();
                    if (!latestPositions[nameKey]) {
                        latestPositions[nameKey] = row;
                        activeNames.add(nameKey);
                    }
                });

                Object.keys(markers).forEach(name => {
                    if (!activeNames.has(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

                const listContainer = document.getElementById('activeDriversList');
                listContainer.innerHTML = '';

                if (activeNames.size === 0) {
                    listContainer.innerHTML = '<li>No active drivers.</li>';
                }

                Object.values(latestPositions).forEach(pos => {
                    const [lat, lon] = pos.coordinates.split(',').map(Number);
                    const name = pos.driver_name.toUpperCase();
                    const time = new Date(pos.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    const reg = latestVehicles[name] || 'N/A';
                    const trailer = latestTrailers[name] || 'N/A';
                    const direction = pos.heading ? `${pos.heading}°` : 'N/A'; 
                    
                    // Create a safe ID string for the HTML elements (removes spaces/special chars)
                    const safeId = name.replace(/[^a-zA-Z0-9]/g, '_');

                    // Check if this driver is currently selected to keep their info visible
                    const displayDetails = (selectedDriver === name) ? 'block' : 'none';

                    // Populate sidebar list with the hidden details row
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="driver-row">
                            <span class="driver-name" title="Click to view details & locate">${name}</span> 
                            <span>${pos.speed} MPH</span>
                        </div>
                        <div id="details-${safeId}" class="driver-details" style="display: ${displayDetails}; font-size: 11.5px; color: #444; margin-top: 6px; padding-top: 6px; border-top: 1px dashed #ddd;">
                            <span style="color:#E62411; font-weight:bold;">Veh:</span> <span style="font-weight:bold; color:#111;">${reg}</span> 
                            <span style="margin: 0 4px; color:#ccc;">|</span> 
                            <span style="color:#E62411; font-weight:bold;">Trl:</span> <span style="font-weight:bold; color:#111;">${trailer}</span>
                        </div>
                    `;
                    
                    // Click listener for the sidebar list
                    li.querySelector('.driver-name').addEventListener('click', () => {
                        // The marker popup event listener (below) will handle expanding the sidebar details automatically!
                        map.flyTo([lat, lon], 16, { duration: 1.5 });
                        if (markers[name]) {
                            setTimeout(() => markers[name].openPopup(), 200);
                        }
                    });

                    listContainer.appendChild(li);

                    // Build Popup
                    const popupContent = `
                        <div style="font-family: sans-serif;">
                            <div class="popup-title">${name}</div>
                            <div class="popup-row"><span class="popup-label">Speed:</span> <span class="popup-val">${pos.speed} MPH</span></div>
                            <div class="popup-row"><span class="popup-label">Heading:</span> <span class="popup-val">${direction}</span></div>
                            <hr>
                            <div class="popup-row"><span class="popup-label">Vehicle:</span> <span class="popup-val">${reg}</span></div>
                            <div class="popup-row"><span class="popup-label">Trailer:</span> <span class="popup-val">${trailer}</span></div>
                            <hr>
                            <div style="font-size: 11px; color: #888; text-align: right;">Updated: ${time}</div>
                        </div>
                    `;

                    // Update or Create Marker
                    if (markers[name]) {
                        markers[name].setLatLng([lat, lon]).setPopupContent(popupContent);
                    } else {
                        markers[name] = L.marker([lat, lon]).addTo(map).bindPopup(popupContent);
                        
                        // SYNC: When a map pin opens, update the state and expand the sidebar menu
                        markers[name].on('popupopen', () => {
                            selectedDriver = name;
                            // Hide all detail divs
                            document.querySelectorAll('.driver-details').forEach(el => el.style.display = 'none');
                            // Show the selected one
                            const detailEl = document.getElementById(`details-${safeId}`);
                            if(detailEl) detailEl.style.display = 'block';
                        });
                        
                        // SYNC: When a map pin closes, collapse the sidebar menu
                        markers[name].on('popupclose', () => {
                            if (selectedDriver === name) {
                                selectedDriver = null;
                                const detailEl = document.getElementById(`details-${safeId}`);
                                if(detailEl) detailEl.style.display = 'none';
                            }
                        });
                    }
                });

                document.getElementById('lastUpdate').innerText = "Last sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Sync Error:", e);
                document.getElementById('lastUpdate').innerText = "Sync Failed: Database error";
            }
        }

        // Run every 30 seconds
        setInterval(updateLiveLocations, 30000);
        updateLiveLocations();
    </script>
</body>
</html>
