<!DOCTYPE html>
<html>
<head>
    <title>Frost Fleet Live Tracker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; }
        
        .overlay { 
            position: absolute; top: 10px; right: 10px; z-index: 1000; 
            background: white; padding: 15px; border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 220px;
        }

        h2 { margin: 0 0 5px 0; font-size: 18px; color: #E62411; border-bottom: 2px solid #E62411; padding-bottom: 5px; }
        .status { font-size: 12px; color: #555; margin-bottom: 10px; }
        
        .info-panel { 
            margin-top: 10px; 
            font-size: 13px; 
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .stat-label { font-weight: bold; color: #333; }
        .stat-value { color: #E62411; font-weight: bold; }
        
        .legend { font-size: 11px; color: #666; margin-top: 8px; font-style: italic; }
    </style>
</head>
<body>

    <div class="overlay">
        <h2>Frost Fleet Live</h2>
        <div id="lastUpdate" class="status">Connecting...</div>
        
        <div id="routeInfo" class="info-panel">
            Select a driver to view daily stats.
        </div>
    </div>
    
    <div id="map"></div>

    <script>
        // --- CONFIG ---
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- INITIALIZE MAP ---
        // Defaults to Warsop area
        const map = L.map('map').setView([53.21, -1.11], 10); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = {};
        let currentRouteLayer = L.layerGroup().addTo(map);

        // --- FUNCTIONS ---

        /**
         * Fetches all points for a driver since 00:01 today,
         * calculates mileage, and draws the route with stationary highlights.
         */
        async function fetchDriverRoute(driverName) {
            currentRouteLayer.clearLayers();
            
            const startOfDay = new Date();
            startOfDay.setHours(0, 0, 1, 0); // Start at 00:01 AM

            const { data, error } = await _supabase
                .from('vehicle_tracking')
                .select('*')
                .eq('driver_name', driverName)
                .gte('created_at', startOfDay.toISOString())
                .order('created_at', { ascending: true });

            if (error) {
                console.error("Route Fetch Error:", error);
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('routeInfo').innerHTML = "No route data for today.";
                return;
            }

            let totalMeters = 0;
            
            for (let i = 1; i < data.length; i++) {
                const prev = data[i-1];
                const curr = data[i];

                const [pLat, pLon] = prev.coordinates.split(',').map(Number);
                const [cLat, cLon] = curr.coordinates.split(',').map(Number);
                
                const pLatLng = L.latLng(pLat, pLon);
                const cLatLng = L.latLng(cLat, cLon);

                const dist = pLatLng.distanceTo(cLatLng);
                const timeDiffMins = (new Date(curr.created_at) - new Date(prev.created_at)) / 1000 / 60;

                totalMeters += dist;

                // stationary logic: Moved less than 25m and took more than 15 mins
                const isStationary = (dist < 25 && timeDiffMins > 15);
                
                L.polyline([pLatLng, cLatLng], {
                    color: isStationary ? '#E62411' : '#3388ff',
                    weight: isStationary ? 6 : 4,
                    opacity: isStationary ? 0.9 : 0.7
                }).addTo(currentRouteLayer);
            }

            const totalMiles = (totalMeters * 0.000621371).toFixed(2);
            
            document.getElementById('routeInfo').innerHTML = `
                <div class="stat-row">
                    <span class="stat-label">Driver:</span>
                    <span class="stat-value">${driverName.toUpperCase()}</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Daily Miles:</span>
                    <span class="stat-value">${totalMiles} mi</span>
                </div>
                <div class="legend">Red segments = Stopped > 15m</div>
            `;
        }

        /**
         * Refreshes live locations, removes inactive drivers (>15m),
         * and updates speed/position.
         */
        async function updateLiveLocations() {
            try {
                // Only fetch drivers who pinged in the last 15 minutes
                const activeCutoff = new Date(Date.now() - 15 * 60 * 1000).toISOString();

                const { data, error } = await _supabase
                    .from('vehicle_tracking')
                    .select('*')
                    .gt('created_at', activeCutoff)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const latestPositions = {};
                const activeNames = new Set();

                // Group by driver name to get only the most recent entry
                data.forEach(row => {
                    const nameKey = row.driver_name.toUpperCase();
                    if (!latestPositions[nameKey]) {
                        latestPositions[nameKey] = row;
                        activeNames.add(nameKey);
                    }
                });

                // Remove markers for drivers who have gone offline
                Object.keys(markers).forEach(name => {
                    if (!activeNames.has(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

                // Update or Create markers
                Object.values(latestPositions).forEach(pos => {
                    const [lat, lon] = pos.coordinates.split(',').map(Number);
                    const name = pos.driver_name.toUpperCase();
                    const time = new Date(pos.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    
                    const popupContent = `
                        <div style="font-family: sans-serif; line-height: 1.4;">
                            <b style="color: #E62411; font-size: 14px;">${name}</b><br>
                            <b>Speed: ${pos.speed} MPH</b><br>
                            <span style="font-size: 11px; color: #666;">Last Ping: ${time}</span><br>
                            <hr style="margin: 8px 0; border: 0; border-top: 1px solid #eee;">
                            <span style="color: #3388ff; cursor: pointer;"><i>Click to view daily route</i></span>
                        </div>
                    `;

                    if (markers[name]) {
                        markers[name].setLatLng([lat, lon]).setPopupContent(popupContent);
                    } else {
                        markers[name] = L.marker([lat, lon]).addTo(map).bindPopup(popupContent);
                        // Trigger route fetch on marker click
                        markers[name].on('click', () => fetchDriverRoute(pos.driver_name));
                    }
                });

                document.getElementById('lastUpdate').innerText = "Last sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("Sync Error:", e);
                document.getElementById('lastUpdate').innerText = "Sync Failed: Database error";
            }
        }

        // Run every 30 seconds
        setInterval(updateLiveLocations, 30000);
        updateLiveLocations();
    </script>
</body>
</html>
