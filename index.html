<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Fleet - Admin Live Map</title>
    
    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #121212; color: white; }
        #map { height: 100vh; width: 100vw; }
        
        /* Overlay UI */
        .admin-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(30, 30, 30, 0.9); padding: 20px;
            border-radius: 12px; border: 1px solid #E62411;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 280px;
        }
        h1 { margin: 0 0 10px 0; font-size: 18px; color: #E62411; text-transform: uppercase; letter-spacing: 1px; }
        .status { font-size: 12px; color: #b0b0b0; margin-bottom: 10px; }
        #lastUpdate { font-weight: bold; color: #fff; }
        
        .legend { font-size: 11px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #444; }
        .legend-item { display: flex; align-items: center; margin-bottom: 5px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        
        /* Map Popup Styling */
        .leaflet-popup-content-wrapper { background: #1e1e1e; color: #fff; border: 1px solid #444; }
        .leaflet-popup-tip { background: #1e1e1e; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>Frost Fleet Live</h1>
        <div class="status">System Status: <span style="color:#27ae60">Active</span></div>
        <div class="status">Updates: <span id="lastUpdate">Initializing...</span></div>
        
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#E62411"></span> Active Driver (< 4hrs)</div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- INITIALIZE MAP ---
        const map = L.map('map').setView([52.9548, -1.1581], 7); // Centered on Nottingham/UK
        
        // Dark Mode Map Tiles
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let markers = {}; // Object to store markers by driver name

        // --- LIVE DATA LOGIC ---
        async function updateLiveLocations() {
            try {
                // 1. Calculate the "Stale" cutoff (4 hours ago)
                const staleCutoff = new Date(Date.now() - 4 * 60 * 60 * 1000).toISOString();

                // 2. Fetch recent pings from the last 4 hours
                const { data, error } = await _supabase
                    .from('vehicle_tracking')
                    .select('*')
                    .gt('created_at', staleCutoff)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // 3. Group by driver to get ONLY their most recent position
                const latestPositions = {};
                data.forEach(row => {
                    if (!latestPositions[row.driver_name]) {
                        latestPositions[row.driver_name] = row;
                    }
                });

                const activeDriversInDB = Object.keys(latestPositions);

                // 4. CLEANUP: Remove markers for drivers who are no longer active/stale
                Object.keys(markers).forEach(name => {
                    if (!activeDriversInDB.includes(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

                // 5. UPDATE/ADD: Place pins for all active drivers
                activeDriversInDB.forEach(name => {
                    const pos = latestPositions[name];
                    const [lat, lon] = pos.coordinates.split(',').map(Number);
                    const time = new Date(pos.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    
                    const popupHtml = `
                        <div style="text-align:center">
                            <strong style="color:#E62411; font-size:14px;">${name.toUpperCase()}</strong><br>
                            <span style="font-size:11px; color:#aaa;">Speed: ${pos.speed} MPH</span><br>
                            <span style="font-size:11px; color:#aaa;">Heading: ${pos.heading}°</span><br>
                            <hr style="border:0; border-top:1px solid #444; margin:5px 0;">
                            <span style="font-size:10px;">Last Active: ${time}</span>
                        </div>
                    `;

                    if (markers[name]) {
                        // Update existing marker
                        markers[name].setLatLng([lat, lon]).setPopupContent(popupHtml);
                    } else {
                        // Create new marker
                        markers[name] = L.marker([lat, lon]).addTo(map).bindPopup(popupHtml);
                    }
                });

                document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Map Sync Error:", err);
                document.getElementById('lastUpdate').innerText = "Sync Error";
            }
        }

        // --- START LIVE UPDATES ---
        updateLiveLocations(); // Initial load
        setInterval(updateLiveLocations, 10000); // Update every 10 seconds

    </script>
</body>
</html>
