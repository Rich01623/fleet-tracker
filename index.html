<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Fleet - Active Drivers Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: #121212; color: white; }
        #map { height: 100vh; width: 100vw; }
        
        .admin-panel {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(30, 30, 30, 0.9); padding: 20px;
            border-radius: 12px; border: 1px solid #E62411;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            min-width: 220px;
        }
        h1 { margin: 0 0 5px 0; font-size: 16px; color: #E62411; text-transform: uppercase; }
        .status-box { font-size: 13px; margin: 10px 0; padding: 10px; background: #000; border-radius: 6px; border-left: 3px solid #27ae60; }
        .driver-count { font-size: 24px; font-weight: 800; color: #fff; }
        .update-tag { font-size: 10px; color: #666; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <h1>Active Fleet</h1>
        <div class="status-box">
            <div class="driver-count" id="activeCount">0</div>
            <div style="font-size: 11px; color: #aaa;">DRIVERS LOGGED IN</div>
        </div>
        <div class="update-tag">Last Sync: <span id="lastUpdate">--:--</span></div>
    </div>

    <div id="map"></div>

    <script>
        const SUPABASE_URL = "https://mbudwnwxucluwgbkgbfx.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1idWR3bnd4dWNsdXdnYmtnYmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMDQwMjYsImV4cCI6MjA5MDc4MDAyNn0.xFv-FiQ894vdfJuQYWQyF4WzQXmlnmnKvz_c8nuzl5Q"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const map = L.map('map').setView([52.9548, -1.1581], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; CARTO' }).addTo(map);

        let markers = {};

        async function updateMap() {
            try {
                // 1. Get the absolute latest log for EVERY driver
                // We fetch the last 100 logs to ensure we cover all active staff
                const { data: logs, error: logErr } = await _supabase
                    .from('fleet_logs')
                    .select('driver_name, action_type, created_at')
                    .order('created_at', { ascending: false })
                    .limit(100);

                if (logErr) throw logErr;

                // 2. Identify who is currently "START" vs "END"
                const driverStatus = {};
                logs.forEach(log => {
                    if (!driverStatus[log.driver_name]) {
                        driverStatus[log.driver_name] = log.action_type;
                    }
                });

                // Filter for only those who are "START" (Logged In)
                const loggedInDrivers = Object.keys(driverStatus).filter(name => driverStatus[name] === 'START');

                // 3. Get the latest location for EVERYONE from the last 24 hours
                const yesterday = new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();
                const { data: locations, error: locErr } = await _supabase
                    .from('vehicle_tracking')
                    .select('*')
                    .gt('created_at', yesterday)
                    .order('created_at', { ascending: false });

                if (locErr) throw locErr;

                // Group locations to get only the latest ping for each driver
                const latestLocs = {};
                locations.forEach(loc => {
                    if (!latestLocs[loc.driver_name]) { latestLocs[loc.driver_name] = loc; }
                });

                // 4. THE FILTER: Only show marker if (Driver is Logged In) AND (We have a recent location)
                const driversToShow = loggedInDrivers.filter(name => latestLocs[name]);

                // Update Active Count UI
                document.getElementById('activeCount').innerText = driversToShow.length;

                // 5. Cleanup: Remove markers for anyone not in our "Logged In" list
                Object.keys(markers).forEach(name => {
                    if (!driversToShow.includes(name)) {
                        map.removeLayer(markers[name]);
                        delete markers[name];
                    }
                });

                // 6. Draw/Update Markers
                driversToShow.forEach(name => {
                    const data = latestLocs[name];
                    const [lat, lon] = data.coordinates.split(',').map(Number);
                    const time = new Date(data.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                    
                    const popup = `<b>${name.toUpperCase()}</b><br>Speed: ${data.speed} MPH<br>Updated: ${time}`;

                    if (markers[name]) {
                        markers[name].setLatLng([lat, lon]).setPopupContent(popup);
                    } else {
                        markers[name] = L.marker([lat, lon]).addTo(map).bindPopup(popup);
                    }
                });

                document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();

            } catch (e) {
                console.error("Map refresh failed:", e);
            }
        }

        setInterval(updateMap, 10000);
        updateMap();
    </script>
</body>
</html>
